<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" fill="none">
  <defs>
    <!-- Gradiente principal cyan → violeta -->
    <linearGradient id="ntGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Gradiente del círculo -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Gradiente texto -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Glow suave -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow fuerte para las letras -->
    <filter id="glowStrong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow texto -->
    <filter id="glowText" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Círculo exterior (arco con brillo) ── -->
  <!-- Sombra/glow del círculo -->
  <circle cx="120" cy="112" r="88" stroke="#22d3ee" stroke-width="1" opacity="0.15" fill="none"/>
  <circle cx="120" cy="112" r="88" stroke="#a855f7" stroke-width="1" opacity="0.15" fill="none"/>

  <!-- Arco principal con gradiente -->
  <circle cx="120" cy="112" r="88"
    stroke="url(#ringGrad)"
    stroke-width="2.5"
    stroke-dasharray="480 80"
    stroke-dashoffset="30"
    stroke-linecap="round"
    fill="none"
    filter="url(#glow)"/>

  <!-- Punto brillante en la parte superior izquierda -->
  <circle cx="50" cy="55" r="3" fill="#22d3ee" opacity="0.9" filter="url(#glow)"/>
  <!-- Punto brillante en la parte superior derecha -->
  <circle cx="190" cy="55" r="2" fill="#a855f7" opacity="0.8" filter="url(#glow)"/>

  <!-- ── Líneas de circuito izquierda ── -->
  <g filter="url(#glow)" opacity="0.85">
    <line x1="32" y1="95"  x2="52" y2="95"  stroke="#22d3ee" stroke-width="1.2"/>
    <line x1="32" y1="108" x2="52" y2="108" stroke="#22d3ee" stroke-width="1.2"/>
    <line x1="32" y1="121" x2="52" y2="121" stroke="#22d3ee" stroke-width="1.2"/>
    <line x1="32" y1="95"  x2="32" y2="121" stroke="#22d3ee" stroke-width="1.2"/>
    <circle cx="29" cy="95"  r="3" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
    <circle cx="29" cy="108" r="3" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
    <circle cx="29" cy="121" r="3" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
    <circle cx="29" cy="95"  r="1.2" fill="#22d3ee"/>
    <circle cx="29" cy="108" r="1.2" fill="#22d3ee"/>
    <circle cx="29" cy="121" r="1.2" fill="#22d3ee"/>
  </g>

  <!-- ── Líneas de circuito derecha ── -->
  <g filter="url(#glow)" opacity="0.85">
    <line x1="188" y1="72" x2="208" y2="72" stroke="#a855f7" stroke-width="1.2"/>
    <line x1="188" y1="85" x2="204" y2="85" stroke="#a855f7" stroke-width="1.2"/>
    <line x1="208" y1="72" x2="208" y2="85" stroke="#a855f7" stroke-width="1.2"/>
    <circle cx="211" cy="72" r="3" fill="none" stroke="#a855f7" stroke-width="1.2"/>
    <circle cx="207" cy="85" r="3" fill="none" stroke="#a855f7" stroke-width="1.2"/>
    <circle cx="211" cy="72" r="1.2" fill="#a855f7"/>
    <circle cx="207" cy="85" r="1.2" fill="#a855f7"/>
  </g>

  <!-- ── Letra N ── -->
  <g filter="url(#glowStrong)">
    <polygon points="68,148 68,76 80,76 116,130 116,76 128,76 128,148 116,148 80,94 80,148"
      fill="url(#ntGrad)"/>
  </g>

  <!-- ── Letra T ── -->
  <g filter="url(#glowStrong)">
    <polygon points="118,76 172,76 172,88 151,88 151,148 139,148 139,88 118,88"
      fill="url(#ntGrad)"/>
  </g>

  <!-- ── Texto NovaTec ── -->
  <text
    x="120" y="210"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="28"
    font-weight="900"
    letter-spacing="2"
    fill="url(#textGrad)"
    filter="url(#glowText)">NovaTec</text>
</svg>
