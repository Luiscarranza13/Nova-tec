<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="ntGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle -->
  <circle cx="100" cy="90" r="72" stroke="url(#circleGrad)" stroke-width="2" stroke-dasharray="420 30" stroke-dashoffset="10" filter="url(#glow)"/>

  <!-- Circuit lines left -->
  <g stroke="#22d3ee" stroke-width="1" opacity="0.7" filter="url(#glow)">
    <line x1="34" y1="78" x2="50" y2="78"/>
    <line x1="34" y1="88" x2="50" y2="88"/>
    <line x1="34" y1="98" x2="50" y2="98"/>
    <circle cx="33" cy="78" r="2.5" fill="#22d3ee"/>
    <circle cx="33" cy="88" r="2.5" fill="#22d3ee"/>
    <circle cx="33" cy="98" r="2.5" fill="#22d3ee"/>
  </g>

  <!-- Circuit lines right -->
  <g stroke="#a855f7" stroke-width="1" opacity="0.7" filter="url(#glow)">
    <line x1="150" y1="62" x2="164" y2="62"/>
    <line x1="150" y1="72" x2="160" y2="72"/>
    <circle cx="165" cy="62" r="2.5" fill="#a855f7"/>
    <circle cx="161" cy="72" r="2.5" fill="#a855f7"/>
  </g>

  <!-- Letter N -->
  <path d="M62 118 L62 62 L72 62 L98 100 L98 62 L108 62 L108 78" stroke="url(#ntGrad)" stroke-width="2" fill="none"/>
  <polygon points="62,62 72,62 108,118 98,118 62,62" fill="url(#ntGrad)" filter="url(#glowStrong)"/>
  <polygon points="62,62 72,62 72,118 62,118" fill="url(#ntGrad)" filter="url(#glowStrong)"/>
  <polygon points="98,62 108,62 108,118 98,118" fill="url(#ntGrad)" filter="url(#glowStrong)"/>

  <!-- Letter T -->
  <polygon points="108,62 148,62 148,72 133,72 133,118 123,118 123,72 108,72" fill="url(#ntGrad)" filter="url(#glowStrong)"/>

  <!-- Text NovaTec -->
  <text x="100" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="1">NovaTec</text>
</svg>
